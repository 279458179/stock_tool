# 数据源配置
data_source:
  primary: baostock
  realtime: tencent

# 选股策略权重
strategy:
  technical_weight: 0.4
  fundamental_weight: 0.3
  capital_weight: 0.3

# 技术面参数
technical:
  ma_periods: [5, 10, 20, 60]
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  volume_ratio: 2.0

# 基本面筛选
fundamental:
  pe_max: 30
  roe_min: 10
  profit_years: 3

# 选股器配置（赚钱版 — 2026-05-29 优化）
selector:
  min_price: 5.0              # 最低价格5元
  max_price: 50.0             # 最高价格50元
  min_score: 50.0             # 最低评分门槛
  min_signals: 2              # 最少共振信号数
  max_pct_1d: 8.0             # 追高过滤：1日涨幅>8%排除
  max_open_pct: 6.0           # 高开>6%且评分<60→剔除
  max_open_pct_hard: 8.0      # 高开>8%→一律剔除
  stock_pool: "hs300"         # 选股池：hs300=all_market

# 止盈止损（保守型配置）
risk:
  default_stop_loss: -0.05    # 默认止损-5%
  default_take_profit: 0.10   # 默认止盈+10%
  position_alert: 0.03        # 盈亏3%提醒

# 通知配置
notification:
  desktop: true               # 桌面弹窗
  sound: true                 # 声音提醒
  feishu_webhook: ""          # 飞书机器人webhook

# 交易时间配置
trading_hours:
  pre_market_start: "09:15"
  market_open: "09:30"
  market_close: "15:00"
  auction_end: "09:25"
